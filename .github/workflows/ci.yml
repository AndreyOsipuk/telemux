name: ci
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: telemux
          POSTGRES_USER: telemux
          POSTGRES_PASSWORD: telemux
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd "pg_isready -U telemux"
          --health-interval 3s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go vet ./...
      - run: go test ./...
      - name: integration tests
        env:
          TELEMUX_TEST_DSN: postgres://telemux:telemux@localhost:5432/telemux?sslmode=disable
        # -p 1: integration-пакеты делят одну БД
        run: go test -tags=integration -p 1 ./internal/store ./internal/e2e
